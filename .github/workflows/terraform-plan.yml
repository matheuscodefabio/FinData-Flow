name: Terraform Plan

on:
  pull_request:
    paths:
      - 'environments/**'
      - 'modules/**'

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]
    
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', upper(matrix.environment))] }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: environments/${{ matrix.environment }}
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: environments/${{ matrix.environment }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: environments/${{ matrix.environment }}
        id: plan
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_lambda_image_uri:    ${{ secrets.LAMBDA_IMAGE_URI }}
          TF_VAR_processor_image_uri: ${{ secrets.PROCESSOR_IMAGE_URI }}
          TF_VAR_db_secret_arn:       ${{ secrets[format('DB_SECRET_ARN_{0}', upper(matrix.environment))] }}
          TF_VAR_sns_alert_arn:       ${{ secrets[format('SNS_ALERT_ARN_{0}', upper(matrix.environment))] }}

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.stdout }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`${{ matrix.environment }}\`\n\`\`\`\n${plan}\n\`\`\``
            });
