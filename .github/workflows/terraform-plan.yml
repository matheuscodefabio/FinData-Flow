name: Terraform Plan

"on":
  pull_request:
    paths:
      - "environments/**"
      - "modules/**"
      - ".github/workflows/terraform-plan.yml"
      - ".github/workflows/terraform-apply.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  lint-and-security:
    name: Lint and Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v3

      - name: TFLint Init
        run: tflint --init

      - name: TFLint Run
        run: tflint -f compact modules/ environments/

      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          quiet: true

  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: lint-and-security
    strategy:
      matrix:
        include:
          - environment: dev
            role_secret: AWS_ROLE_ARN_DEV
            db_secret: DB_SECRET_ARN_DEV
            sns_secret: SNS_ALERT_ARN_DEV
          - environment: staging
            role_secret: AWS_ROLE_ARN_STAGING
            db_secret: DB_SECRET_ARN_STAGING
            sns_secret: SNS_ALERT_ARN_STAGING
          - environment: prod
            role_secret: AWS_ROLE_ARN_PROD
            db_secret: DB_SECRET_ARN_PROD
            sns_secret: SNS_ALERT_ARN_PROD

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[matrix.role_secret] }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init (no backend)
        run: terraform -chdir=environments/${{ matrix.environment }} init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=environments/${{ matrix.environment }} validate

      - name: Terraform Plan
        run: |
          terraform -chdir=environments/${{ matrix.environment }} plan \
            -no-color \
            -lock=false \
            -out=tfplan \
            -var="lambda_image_uri=${{ secrets.LAMBDA_IMAGE_URI }}" \
            -var="processor_image_uri=${{ secrets.PROCESSOR_IMAGE_URI }}" \
            -var="db_secret_arn=${{ secrets[matrix.db_secret] }}" \
            -var="sns_alert_arn=${{ secrets[matrix.sns_secret] }}" \
            | tee environments/${{ matrix.environment }}/plan.txt

      - name: Job Summary
        run: |
          {
            echo "## Terraform Plan - ${{ matrix.environment }}"
            echo
            echo '\`\`\`'
            tail -n 120 environments/${{ matrix.environment }}/plan.txt
            echo '\`\`\`'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'environments/${{ matrix.environment }}/plan.txt';
            const content = fs.readFileSync(path, 'utf8');
            const trimmed = content.length > 60000 ? content.slice(0, 60000) + '\n...truncated...' : content;
            const body = "## Terraform Plan - ${{ matrix.environment }}\n\n```\n" + trimmed + "\n```";
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
