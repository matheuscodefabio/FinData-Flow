name: Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'modules/**'
      - 'environments/**'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
      - '!**.md'

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  TERRAFORM_VERSION: 1.5.0

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    outputs:
      ingestor_image: ${{ steps.images.outputs.ingestor_image }}
      processor_image: ${{ steps.images.outputs.processor_image }}
      image_tag: ${{ steps.images.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Image Tag (commit SHA)
        id: images
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "ingestor_image=${{ env.ECR_REGISTRY }}/findata-ingestor:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "processor_image=${{ env.ECR_REGISTRY }}/findata-processor:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build & Push Ingestor Image
        run: |
          docker build \
            -f docker/Dockerfile.ingestor \
            -t ${{ steps.images.outputs.ingestor_image }} \
            -t ${{ env.ECR_REGISTRY }}/findata-ingestor:latest \
            .
          docker push ${{ steps.images.outputs.ingestor_image }}
          docker push ${{ env.ECR_REGISTRY }}/findata-ingestor:latest

      - name: Build & Push Processor Image
        run: |
          docker build \
            -f docker/Dockerfile.processor \
            -t ${{ steps.images.outputs.processor_image }} \
            -t ${{ env.ECR_REGISTRY }}/findata-processor:latest \
            .
          docker push ${{ steps.images.outputs.processor_image }}
          docker push ${{ env.ECR_REGISTRY }}/findata-processor:latest

  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: dev
      url: https://${{ steps.outputs.outputs.frontend_domain_dev }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: environments/dev
        run: |
          terraform init \
            -backend-config="bucket=findata-tfstate-dev-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="dynamodb_table=findata-tfstate-lock"

      - name: Terraform Plan
        working-directory: environments/dev
        run: terraform plan -var="lambda_image_uri=${{ needs.build.outputs.ingestor_image }}" \
                           -var="processor_image_uri=${{ needs.build.outputs.processor_image }}" \
                           -out=tfplan

      - name: Terraform Apply
        working-directory: environments/dev
        run: terraform apply -auto-approve tfplan

      - name: Get Outputs
        id: outputs
        working-directory: environments/dev
        run: |
          FRONTEND_DOMAIN=$(terraform output -raw cloudfront_domain_name 2>/dev/null || echo "pending")
          echo "frontend_domain_dev=$FRONTEND_DOMAIN" >> $GITHUB_OUTPUT

  deploy-staging:
    name: Deploy to STAGING (Approval Required)
    runs-on: ubuntu-latest
    needs: [build, deploy-dev]
    environment:
      name: staging
      url: https://${{ steps.outputs.outputs.frontend_domain_staging }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: environments/staging
        run: |
          terraform init \
            -backend-config="bucket=findata-tfstate-staging-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="dynamodb_table=findata-tfstate-lock"

      - name: Terraform Plan
        working-directory: environments/staging
        run: terraform plan -var="lambda_image_uri=${{ needs.build.outputs.ingestor_image }}" \
                           -var="processor_image_uri=${{ needs.build.outputs.processor_image }}" \
                           -out=tfplan

      - name: Terraform Apply
        working-directory: environments/staging
        run: terraform apply -auto-approve tfplan

      - name: Run Integration Tests
        run: |
          # Testes básicos de integridade
          echo "Running smoke tests in staging..."
          STAGING_API=$(terraform output -raw api_endpoint 2>/dev/null)
          curl -f -H "Content-Type: application/json" \
               -d '{"test": true}' \
               ${STAGING_API}/ingest || exit 1

      - name: Get Outputs
        id: outputs
        working-directory: environments/staging
        run: |
          FRONTEND_DOMAIN=$(terraform output -raw cloudfront_domain_name 2>/dev/null || echo "pending")
          echo "frontend_domain_staging=$FRONTEND_DOMAIN" >> $GITHUB_OUTPUT

  deploy-prod:
    name: Deploy to PROD (Approval Required)
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    environment:
      name: prod
      url: https://${{ steps.outputs.outputs.frontend_domain_prod }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: environments/prod
        run: |
          terraform init \
            -backend-config="bucket=findata-tfstate-prod-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="dynamodb_table=findata-tfstate-lock"

      - name: Terraform Plan
        working-directory: environments/prod
        run: terraform plan -var="lambda_image_uri=${{ needs.build.outputs.ingestor_image }}" \
                           -var="processor_image_uri=${{ needs.build.outputs.processor_image }}" \
                           -out=tfplan

      - name: Terraform Apply (Lambda Alias Update — Canary)
        working-directory: environments/prod
        run: |
          # Canary: 10% de tráfego para nova versão
          terraform apply -auto-approve tfplan

      - name: Wait for Canary (15min)
        run: sleep 900

      - name: Monitor Canary Metrics
        run: |
          # Verificar CloudWatch: P99 < 150ms, error rate < 1%
          echo "Checking canary health metrics..."
          # Implementação real consultaria CloudWatch API

      - name: Complete Canary to 100%
        run: |
          # AWS Lambda alias traffic shift completo
          echo "Shifting 100% traffic to new version..."
          # CLI: aws lambda update-alias --shift-complete

      - name: Get Outputs
        id: outputs
        working-directory: environments/prod
        run: |
          FRONTEND_DOMAIN=$(terraform output -raw cloudfront_domain_name 2>/dev/null || echo "pending")
          echo "frontend_domain_prod=$FRONTEND_DOMAIN" >> $GITHUB_OUTPUT

      - name: Notify Deployment Success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: "✅ FinData production deployment complete — Commit: ${{ github.sha }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify Deployment Failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "❌ FinData production deployment FAILED — Commit: ${{ github.sha }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  rollback:
    name: Rollback PROD (Manual)
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: deploy-prod
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback Lambda Alias
        run: |
          # Volta alias para versão anterior em < 30s
          PREVIOUS_VERSION=$(aws lambda list-versions-by-function \
            --function-name findata-ingestor-prod \
            --query 'Versions[-2].Version' \
            --output text)
          aws lambda update-alias \
            --function-name findata-ingestor-prod \
            --name stable \
            --function-version $PREVIOUS_VERSION

      - name: Notify Rollback
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "⚠️ FinData production rolled back to previous version"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
