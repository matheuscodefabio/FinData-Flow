name: Scheduled Health Check & Scaling

"on":
  schedule:
    - cron: '0 */6 * * *'  # A cada 6 horas
  workflow_dispatch:

jobs:
  health-check:
    name: Monitor Prod Health
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: us-east-1

      - name: Run health checks
        run: |
          chmod +x scripts/health-check.sh
          FUNCTION_NAME="findata-ingestor-prod" \
          ALIAS_NAME="stable" \
          DLQ_NAME="findata-processor-dlq-prod" \
          ECS_CLUSTER_NAME="findata-processor-prod" \
          P99_THRESHOLD_MS="130" \
          ECS_STOPPED_THRESHOLD="2" \
          AWS_REGION="us-east-1" \
          ./scripts/health-check.sh

      - name: Notify on Issues
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "⚠️ FinData PROD health check FAILED — verifique CloudWatch"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
