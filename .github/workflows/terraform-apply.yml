name: Terraform Apply

"on":
  push:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
      - "scripts/**"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "deploy or rollback"
        required: true
        default: "deploy"
        type: choice
        options: [deploy, rollback]
      previous_version:
        description: "Required when action=rollback"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: "1.7.0"

jobs:
  resolve-artifact:
    name: Resolve immutable artifact
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.action == 'deploy'
    outputs:
      lambda_image_uri: ${{ steps.resolve.outputs.lambda_image_uri }}
      processor_image_uri: ${{ steps.resolve.outputs.processor_image_uri }}
    steps:
      - id: resolve
        run: |
          LAMBDA_IMAGE_URI="${{ vars.LAMBDA_IMAGE_URI }}"
          PROCESSOR_IMAGE_URI="${{ vars.PROCESSOR_IMAGE_URI }}"
          [[ -n "$LAMBDA_IMAGE_URI" && -n "$PROCESSOR_IMAGE_URI" ]] || {
            echo "::error::Define vars.LAMBDA_IMAGE_URI e vars.PROCESSOR_IMAGE_URI"
            exit 1
          }
          [[ "$LAMBDA_IMAGE_URI" == *@sha256:* && "$PROCESSOR_IMAGE_URI" == *@sha256:* ]] || {
            echo "::error::Use imagem imutavel com digest (@sha256)"
            exit 1
          }
          echo "lambda_image_uri=$LAMBDA_IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "processor_image_uri=$PROCESSOR_IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy-preprod:
    name: Deploy ${{ matrix.env_name }}
    runs-on: ubuntu-latest
    needs: resolve-artifact
    if: github.event_name == 'push' || inputs.action == 'deploy'
    strategy:
      max-parallel: 1
      matrix:
        env_name: [dev, staging]
    environment: ${{ matrix.env_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init/Plan/Apply
        run: |
          terraform -chdir=environments/${{ matrix.env_name }} init \
            -backend-config="bucket=findata-tfstate-${{ matrix.env_name }}-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="dynamodb_table=findata-tfstate-lock"

          terraform -chdir=environments/${{ matrix.env_name }} plan -input=false -out=tfplan \
            -var="lambda_image_uri=${{ needs.resolve-artifact.outputs.lambda_image_uri }}" \
            -var="processor_image_uri=${{ needs.resolve-artifact.outputs.processor_image_uri }}" \
            -var="db_secret_arn=${{ secrets.DB_SECRET_ARN }}" \
            -var="sns_alert_arn=${{ secrets.SNS_ALERT_ARN }}"

          terraform -chdir=environments/${{ matrix.env_name }} apply -input=false tfplan

      - name: Smoke test
        run: |
          chmod +x scripts/smoke-test.sh
          API_URL=$(terraform -chdir=environments/${{ matrix.env_name }} output -raw api_endpoint)
          ./scripts/smoke-test.sh "$API_URL"

  deploy-prod:
    name: Deploy PROD + CodeDeploy Canary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [deploy-preprod, resolve-artifact]
    if: github.event_name == 'push' || inputs.action == 'deploy'
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init/Plan/Apply
        run: |
          terraform -chdir=environments/prod init \
            -backend-config="bucket=findata-tfstate-prod-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="dynamodb_table=findata-tfstate-lock"

          terraform -chdir=environments/prod plan -input=false -out=tfplan \
            -var="lambda_image_uri=${{ needs.resolve-artifact.outputs.lambda_image_uri }}" \
            -var="processor_image_uri=${{ needs.resolve-artifact.outputs.processor_image_uri }}" \
            -var="db_secret_arn=${{ secrets.DB_SECRET_ARN_PROD }}" \
            -var="sns_alert_arn=${{ secrets.SNS_ALERT_ARN_PROD }}"

          terraform -chdir=environments/prod apply -input=false tfplan

      - name: Create CodeDeploy deployment
        run: |
          FUNCTION_NAME=$(terraform -chdir=environments/prod output -raw lambda_function_name)
          ALIAS_NAME=$(terraform -chdir=environments/prod output -raw lambda_alias_name)
          APP_NAME=$(terraform -chdir=environments/prod output -raw codedeploy_app_name)
          DEPLOYMENT_GROUP_NAME=$(terraform -chdir=environments/prod output -raw deployment_group_name)

          CURRENT_VERSION=$(aws lambda get-alias \
            --region "${{ env.AWS_REGION }}" \
            --function-name "$FUNCTION_NAME" \
            --name "$ALIAS_NAME" \
            --query 'FunctionVersion' --output text)

          TARGET_VERSION=$(aws lambda list-versions-by-function \
            --region "${{ env.AWS_REGION }}" \
            --function-name "$FUNCTION_NAME" \
            --query 'Versions[-1].Version' --output text)

          if [[ "$CURRENT_VERSION" == "$TARGET_VERSION" ]]; then
            echo "Nenhuma nova versao publicada para canary; seguindo com smoke test"
            exit 0
          fi

          cat > appspec.yaml <<EOF
          version: 0.0
          Resources:
            - FinDataIngestor:
                Type: AWS::Lambda::Function
                Properties:
                  Name: ${FUNCTION_NAME}
                  Alias: ${ALIAS_NAME}
                  CurrentVersion: ${CURRENT_VERSION}
                  TargetVersion: ${TARGET_VERSION}
          EOF

          CONTENT=$(jq -Rs . < appspec.yaml)
          cat > revision.json <<EOF
          {
            "revisionType": "AppSpecContent",
            "appSpecContent": {
              "content": ${CONTENT}
            }
          }
          EOF

          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --region "${{ env.AWS_REGION }}" \
            --application-name "$APP_NAME" \
            --deployment-group-name "$DEPLOYMENT_GROUP_NAME" \
            --revision file://revision.json \
            --description "FinData Lambda canary deploy ${GITHUB_SHA}" \
            --query 'deploymentId' \
            --output text)

          echo "CodeDeploy deployment id: $DEPLOYMENT_ID"
          aws deploy wait deployment-successful \
            --region "${{ env.AWS_REGION }}" \
            --deployment-id "$DEPLOYMENT_ID"

      - name: Smoke test prod
        run: |
          chmod +x scripts/smoke-test.sh
          API_URL=$(terraform -chdir=environments/prod output -raw api_endpoint)
          ./scripts/smoke-test.sh "$API_URL"

  manual-rollback:
    name: Manual rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'rollback'
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate target version
        run: |
          [[ -n "${{ inputs.previous_version }}" ]] || {
            echo "::error::previous_version e obrigatorio"
            exit 1
          }
          FUNCTION_NAME="findata-ingestor-prod"
          ALIAS_NAME="stable"

          aws lambda get-function \
            --region "${{ env.AWS_REGION }}" \
            --function-name "$FUNCTION_NAME" \
            --qualifier "${{ inputs.previous_version }}" > /dev/null

      - name: Execute emergency rollback (update alias)
        run: |
          aws lambda update-alias \
            --region "${{ env.AWS_REGION }}" \
            --function-name "findata-ingestor-prod" \
            --name "stable" \
            --function-version "${{ inputs.previous_version }}" \
            --routing-config "AdditionalVersionWeights={}"

          echo "Rollback aplicado: stable -> versão ${{ inputs.previous_version }}"