name: Terraform Apply

"on":
  push:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
      - "scripts/**"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "deploy or rollback"
        required: true
        default: "deploy"
        type: choice
        options: [deploy, rollback]
      previous_version:
        description: "Required when action=rollback"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: "1.7.0"
  LAMBDA_CANARY_PERCENT: "0.10"
  LAMBDA_LATENCY_THRESHOLD_MS: "130"
  CANARY_ERROR_RATE_THRESHOLD: "0.02"
  CANARY_WINDOW_MINUTES: "15"
  CANARY_POLL_INTERVAL_SECONDS: "60"

jobs:
  resolve-artifact:
    name: Resolve immutable artifact
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.action == 'deploy'
    outputs:
      lambda_image_uri: ${{ steps.resolve.outputs.lambda_image_uri }}
      processor_image_uri: ${{ steps.resolve.outputs.processor_image_uri }}
    steps:
      - id: resolve
        run: |
          LAMBDA_IMAGE_URI="${{ vars.LAMBDA_IMAGE_URI }}"
          PROCESSOR_IMAGE_URI="${{ vars.PROCESSOR_IMAGE_URI }}"
          [[ -n "$LAMBDA_IMAGE_URI" && -n "$PROCESSOR_IMAGE_URI" ]] || {
            echo "::error::Define vars.LAMBDA_IMAGE_URI e vars.PROCESSOR_IMAGE_URI"
            exit 1
          }
          [[ "$LAMBDA_IMAGE_URI" == *@sha256:* && "$PROCESSOR_IMAGE_URI" == *@sha256:* ]] || {
            echo "::error::Use imagem imutavel com digest (@sha256)"
            exit 1
          }
          echo "lambda_image_uri=$LAMBDA_IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "processor_image_uri=$PROCESSOR_IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy-preprod:
    name: Deploy ${{ matrix.env_name }}
    runs-on: ubuntu-latest
    needs: resolve-artifact
    if: github.event_name == 'push' || inputs.action == 'deploy'
    strategy:
      max-parallel: 1
      matrix:
        env_name: [dev, staging]
    environment: ${{ matrix.env_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init/Plan/Apply
        run: |
          terraform -chdir=environments/${{ matrix.env_name }} init \
            -backend-config="bucket=findata-tfstate-${{ matrix.env_name }}-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="dynamodb_table=findata-tfstate-lock"

          terraform -chdir=environments/${{ matrix.env_name }} plan -input=false -out=tfplan \
            -var="lambda_image_uri=${{ needs.resolve-artifact.outputs.lambda_image_uri }}" \
            -var="processor_image_uri=${{ needs.resolve-artifact.outputs.processor_image_uri }}" \
            -var="db_secret_arn=${{ secrets.DB_SECRET_ARN }}" \
            -var="sns_alert_arn=${{ secrets.SNS_ALERT_ARN }}"

          terraform -chdir=environments/${{ matrix.env_name }} apply -input=false tfplan

      - name: Smoke test
        run: |
          chmod +x scripts/smoke-test.sh
          API_URL=$(terraform -chdir=environments/${{ matrix.env_name }} output -raw api_endpoint)
          ./scripts/smoke-test.sh "$API_URL"

  deploy-prod:
    name: Deploy PROD + Canary
    runs-on: ubuntu-latest
    needs: [deploy-preprod, resolve-artifact]
    if: github.event_name == 'push' || inputs.action == 'deploy'
    environment: prod
    outputs:
      previous_version: ${{ steps.capture_previous.outputs.previous_version }}
      function_name: ${{ steps.capture_previous.outputs.function_name }}
      alias_name: ${{ steps.capture_previous.outputs.alias_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - id: capture_previous
        name: Capture alias target before deploy
        run: |
          FUNCTION_NAME="findata-ingestor-prod"
          ALIAS_NAME="stable"
          PREVIOUS_VERSION=$(aws lambda get-alias \
            --function-name "$FUNCTION_NAME" \
            --name "$ALIAS_NAME" \
            --query 'FunctionVersion' --output text)
          echo "previous_version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"
          echo "function_name=$FUNCTION_NAME" >> "$GITHUB_OUTPUT"
          echo "alias_name=$ALIAS_NAME" >> "$GITHUB_OUTPUT"

      - name: Terraform Init/Plan/Apply
        run: |
          terraform -chdir=environments/prod init \
            -backend-config="bucket=findata-tfstate-prod-${{ secrets.AWS_ACCOUNT_ID }}" \
            -backend-config="dynamodb_table=findata-tfstate-lock"

          terraform -chdir=environments/prod plan -input=false -out=tfplan \
            -var="lambda_image_uri=${{ needs.resolve-artifact.outputs.lambda_image_uri }}" \
            -var="processor_image_uri=${{ needs.resolve-artifact.outputs.processor_image_uri }}" \
            -var="db_secret_arn=${{ secrets.DB_SECRET_ARN_PROD }}" \
            -var="sns_alert_arn=${{ secrets.SNS_ALERT_ARN_PROD }}"

          terraform -chdir=environments/prod apply -input=false tfplan

      - name: Evaluate canary and promote or rollback
        run: |
          chmod +x scripts/canary-evaluate.sh scripts/lambda-rollback.sh

          NEW_VERSION=$(aws lambda list-versions-by-function \
            --function-name "${{ steps.capture_previous.outputs.function_name }}" \
            --query 'Versions[-1].Version' --output text)

          ./scripts/canary-evaluate.sh \
            --function-name "${{ steps.capture_previous.outputs.function_name }}" \
            --alias-name "${{ steps.capture_previous.outputs.alias_name }}" \
            --previous-version "${{ steps.capture_previous.outputs.previous_version }}" \
            --new-version "$NEW_VERSION" \
            --canary-percent "${{ env.LAMBDA_CANARY_PERCENT }}" \
            --latency-threshold-ms "${{ env.LAMBDA_LATENCY_THRESHOLD_MS }}" \
            --error-rate-threshold "${{ env.CANARY_ERROR_RATE_THRESHOLD }}" \
            --window-minutes "${{ env.CANARY_WINDOW_MINUTES }}" \
            --poll-interval-seconds "${{ env.CANARY_POLL_INTERVAL_SECONDS }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Smoke test prod
        run: |
          chmod +x scripts/smoke-test.sh
          API_URL=$(terraform -chdir=environments/prod output -raw api_endpoint)
          ./scripts/smoke-test.sh "$API_URL"

  rollback-on-failure:
    name: Rollback PROD on failure
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: failure() && (github.event_name == 'push' || inputs.action == 'deploy')
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Rollback alias
        run: |
          chmod +x scripts/lambda-rollback.sh
          PREV="${{ needs.deploy-prod.outputs.previous_version }}"
          [[ -n "$PREV" && "$PREV" != "null" ]] || {
            echo "::warning::Sem versao anterior para rollback"
            exit 0
          }
          ./scripts/lambda-rollback.sh \
            "${{ needs.deploy-prod.outputs.function_name }}" \
            "${{ needs.deploy-prod.outputs.alias_name }}" \
            "$PREV" \
            "${{ env.AWS_REGION }}"

  manual-rollback:
    name: Manual rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'rollback'
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate target version
        run: |
          [[ -n "${{ inputs.previous_version }}" ]] || {
            echo "::error::previous_version e obrigatorio"
            exit 1
          }
          aws lambda get-function \
            --function-name findata-ingestor-prod \
            --qualifier "${{ inputs.previous_version }}" > /dev/null

      - name: Execute rollback
        run: |
          chmod +x scripts/lambda-rollback.sh
          ./scripts/lambda-rollback.sh \
            "findata-ingestor-prod" \
            "stable" \
            "${{ inputs.previous_version }}" \
            "${{ env.AWS_REGION }}"